<!-- Fullscreen Player Question View -->
<div id="player-fullscreen-question" class="hidden fixed inset-0 bg-gray-900 z-50 flex flex-col">
    <!-- Fullscreen Header -->
    <div class="flex items-center justify-between p-6 bg-gray-800">
        <div>
            <h2 id="player-fullscreen-question-category" class="text-3xl font-bold text-blue-400">Category</h2>
            <p id="player-fullscreen-question-number" class="text-xl text-gray-400">Question 1/30</p>
        </div>
        <div class="text-right">
            <div id="player-fullscreen-timer" class="text-6xl font-mono font-bold text-white">60</div>
            <p class="text-lg text-gray-400">seconds</p>
        </div>
        <button id="player-exit-fullscreen" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors text-lg">
            ❌ Exit Fullscreen
        </button>
    </div>
    
    <!-- Fullscreen Question Content -->
    <div class="flex-1 flex items-center justify-center p-8">
        <div class="max-w-5xl w-full text-center">
            <h3 id="player-fullscreen-question-text" class="text-5xl font-bold text-white leading-relaxing mb-12 min-h-[150px] flex items-center justify-center">
                Loading question...
            </h3>
            
            <!-- Fullscreen Answer Options -->
            <div id="player-fullscreen-question-options" class="grid grid-cols-2 gap-6 max-w-4xl mx-auto">
                <!-- Options will be added here in 2x2 grid -->
            </div>
        </div>
    </div>
    
    <!-- Fullscreen Answer Status -->
    <div class="p-6 bg-gray-800 text-center">
        <div id="player-fullscreen-answer-status" class="text-xl text-gray-400">Select your answer</div>
        
        <!-- Fullscreen Skip Question Button -->
        <div class="mt-4">
            <button id="player-skip-question" class="px-8 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition-colors text-lg">
                ⏭️ Skip Question
            </button>
        </div>
    </div>
</div>

<!-- Connection Status -->
<div id="connection-status" class="hidden fixed top-0 left-0 right-0 bg-red-600 text-white text-center py-2 text-sm z-50">
    🔌 Connection lost. Trying to reconnect...
</div>

<!-- Loading Overlay -->
<div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-gray-800 rounded-2xl p-8 text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
        <p id="loading-text" class="text-white">Loading...</p>
    </div>
</div>
