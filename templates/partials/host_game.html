<!-- Game Screen -->
<div id="game-screen" class="hidden container mx-auto px-4 py-8 max-h-screen overflow-hidden">
    <div class="max-w-7xl mx-auto h-full">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 h-full" id="game-layout">
            <!-- Question Display - TV Optimized -->
            <div class="lg:col-span-3" id="question-container">
                <div class="bg-gray-800 rounded-2xl p-6 h-full flex flex-col">
                    <!-- Header -->
                    <div class="flex items-center justify-between mb-6">
                        <div>
                            <h2 id="question-category" class="text-2xl font-bold text-blue-400">Category</h2>
                            <p id="question-number" class="text-lg text-gray-400">Question 1/30</p>
                        </div>
                        <div class="text-right">
                            <div class="text-5xl font-mono font-bold text-white" id="timer">60</div>
                            <p class="text-base text-gray-400">seconds</p>
                        </div>
                    </div>
                    
                    <!-- Question Text - Larger for TV -->
                    <div id="question-content" class="mb-6 flex-shrink-0">
                        <h3 class="text-5xl font-bold text-white leading-relaxing min-h-[120px] flex items-center" id="question-text">Loading question...</h3>
                    </div>
                    
                    <!-- Answer Options - 2x2 Grid for TV -->
                    <div id="question-options" class="grid grid-cols-2 gap-4 mb-6 flex-1">
                        <!-- Options will be added here in 2x2 grid -->
                    </div>
                    
                    <!-- Question Results with Explanation (Hidden by default) -->
                    <div id="question-results" class="hidden flex-shrink-0">
                        <div class="bg-gray-700 rounded-lg p-6">
                            <h4 class="text-xl font-semibold text-white mb-4">📋 Results</h4>
                            <div class="space-y-4">
                                <div>
                                    <h5 class="text-lg font-semibold text-green-300 mb-2">Correct Answer:</h5>
                                    <p id="correct-answer" class="text-green-200 text-lg"></p>
                                </div>
                                <div>
                                    <h5 class="text-lg font-semibold text-blue-300 mb-2">Explanation:</h5>
                                    <p id="question-explanation" class="text-blue-200 text-base leading-relaxed"></p>
                                </div>
                                <div id="player-votes" class="hidden">
                                    <h5 class="text-lg font-semibold text-purple-300 mb-2">Player Votes:</h5>
                                    <div id="player-votes-content" class="text-purple-200 text-sm space-y-1"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Game Status & Controls - Side Panel -->
            <div class="space-y-4 h-full overflow-y-auto" id="side-panel">
                <!-- Game Controls -->
                <div class="bg-gray-800 rounded-2xl p-6">
                    <h3 class="text-xl font-semibold mb-4 text-white">🎮 Controls</h3>
                    <div class="space-y-3">
                        <button id="toggle-fullscreen" class="w-full px-4 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors text-sm">📺 Fullscreen</button>
                        <button id="toggle-results" class="w-full px-4 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors text-sm">📋 Show Explanation</button>
                        <div class="grid grid-cols-1 gap-2">
                            <button id="pause-timer" class="w-full px-4 py-3 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition-colors text-sm">⏸️ Pause Timer</button>
                            <button id="resume-timer" class="hidden w-full px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors text-sm">▶️ Resume Timer</button>
                        </div>
                        <div class="grid grid-cols-1 gap-2">
                            <button id="regenerate-question" class="w-full px-4 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm">🔄 New Question</button>
                            <button id="next-question" class="w-full px-4 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors text-sm">➡️ Next Question</button>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="checkbox" id="auto-advance-toggle" class="h-4 w-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                            <label for="auto-advance-toggle" class="text-sm text-gray-300">Auto-advance</label>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm text-gray-300">Auto-advance time: <span id="auto-advance-slider-value" class="text-blue-400 font-semibold">15</span>s</label>
                            <input type="range" id="auto-advance-slider" min="5" max="45" value="15" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer slider">
                            <div class="flex justify-between text-xs text-gray-400">
                                <span>5s</span>
                                <span>25s</span>
                                <span>45s</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Answer Status -->
                <div class="bg-gray-800 rounded-2xl p-6">
                    <h3 class="text-xl font-semibold mb-4 text-white">📊 Answer Status</h3>
                    <div id="answer-status" class="space-y-2">
                        <!-- Answer status will be added here -->
                    </div>
                </div>
                
                <!-- Current Scores -->
                <div class="bg-gray-800 rounded-2xl p-6">
                    <h3 class="text-xl font-semibold mb-4 text-white">🏆 Current Scores</h3>
                    <div id="scoreboard" class="space-y-2 max-h-60 overflow-y-auto">
                        <!-- Scores will be added here -->
                    </div>
                </div>
                
                <!-- Game Progress -->
                <div class="bg-gray-800 rounded-2xl p-6">
                    <h3 class="text-xl font-semibold mb-4 text-white">📈 Game Progress</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between text-lg">
                            <span class="text-gray-300">Question:</span>
                            <span id="progress-question" class="text-white font-semibold">1/30</span>
                        </div>
                        <div class="w-full bg-gray-700 rounded-full h-3">
                            <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-300" style="width: 3.33%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Results Screen -->
<div id="results-screen" class="hidden container mx-auto px-4 py-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-gray-800 rounded-2xl p-8">
            <h1 class="text-4xl font-bold text-yellow-400 text-center mb-8">🎉 Game Finished!</h1>
            
            <!-- Final Scores Table -->
            <div class="bg-gray-700 rounded-lg p-6 mb-8">
                <h2 class="text-2xl font-semibold text-white mb-6 text-center">Final Results</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-white">
                        <thead>
                            <tr class="border-b border-gray-600">
                                <th class="text-left py-3 px-4 text-lg">Position</th>
                                <th class="text-left py-3 px-4 text-lg">Player</th>
                                <th class="text-left py-3 px-4 text-lg">Score</th>
                            </tr>
                        </thead>
                        <tbody id="final-scores">
                            <!-- Final scores will be added here as table rows -->
                        </tbody>
                    </table>
                </div>
            </div>
            
            <!-- Winner Highlight -->
            <div id="winner-highlight" class="text-center mb-8 hidden">
                <div class="bg-yellow-600 rounded-lg p-6">
                    <h2 class="text-2xl font-bold text-white">🏆 Winner!</h2>
                    <p class="text-yellow-200 text-lg" id="winner-name"></p>
                </div>
            </div>
            
            <!-- Action Button -->
            <div class="text-center">
                <button id="new-game" class="w-full py-3 px-6 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">🎮 New Game</button>
            </div>
        </div>
    </div>
</div>
